# Babies and Boomer — keeper dashboard configuration
# Most of this was pulled directly from the Sleeper API. Edit league rules here.

league:
  name: "Babies and Boomer"
  sleeper_league_id: "1312885282554535936"   # current (2026) season
  current_season: 2026
  num_teams: 10
  draft_rounds: 16
  scoring: ppr           # ppr | half | std  (used to pick which ADP feed to pull)
  max_regular_keepers: 3 # Keeper 1/2/3
  max_rookie_keepers: 2  # Rookie Keeper slots
  # If true, a keeper must land on a draft pick the team still OWNS — if the cost
  # round was traded away it bumps to the next-earlier owned pick. This league
  # keeps it simple: a keeper just costs its computed round (draft/bump/ADP),
  # regardless of which picks were traded, so leave this false.
  enforce_owned_picks: false
  # After this moment, "Set My Keepers" goes read-only (the board stays visible).
  # Local wall-clock time in keeper_timezone below (DST handled automatically).
  # Leave blank/remove for no deadline.
  keeper_deadline:       # not set yet — submissions stay open
  keeper_timezone: "America/Indiana/Indianapolis"  # Indiana Eastern (EST/EDT)

# 2026 draft order isn't set yet (picks haven't been drawn), so there's no manual
# override here. The Draft Board falls back to Sleeper's slot_to_roster_id and is
# marked provisional until the order is drawn. Add a `draft_order:` list (owner IDs
# in pick order, slot 1 first) once it's known.

# Keeper rules (house rules — Sleeper can't tell us these)
rules:
  max_keep_years: 3      # a regular keeper can be kept at most this many years
  year2_bump_rounds: 3   # 2nd year: cost moves up this many rounds (or ADP, manager's choice)
  # rookie keepers can be kept for their whole career. Cost basis while in the rookie slot:
  #   last_rounds     -> they take your last draft rounds (16, then 15, ...) first
  #   original_round  -> locked at the round they were originally drafted as a rookie
  #   fixed_round     -> always costs `rookie_fixed_round`
  #   free            -> no draft pick cost
  rookie_keeper_cost: last_rounds
  rookie_fixed_round: 16
  # When a ROOKIE keeper is moved into a regular keeper slot, what does that first
  # regular-keeper year cost? (the 3-year clock starts at the conversion either way)
  #   original_round  -> the round they were originally drafted in their rookie year
  #   last_rounds     -> a last-round pick (the other league's rule)
  rookie_conversion_cost: original_round
  # Let a manager keep a player at their ADP round when the rule cost would be an
  # EARLIER (more expensive) pick — i.e. ADP can lower a keeper's cost, never forced
  # to overpay vs. market. ("you can use a lesser ADP value if you want.")
  allow_adp_discount: true

